<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Weather Forecast</title>
  <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/77/0b/80/770b805d5c99c7931366c2e84e88f251.jpg" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.5s ease;
      background: #fff;
    }
    body.loaded {
      background: linear-gradient(to right, #1e3c72, #2a5298);
    }
    body.clear {
      background: linear-gradient(to right, #4776E6, #8E54E9);
    }
    body.clouds {
      background: linear-gradient(to right, #6D6027, #D2D091);
    }
    body.rain {
      background: linear-gradient(to right, #2C3E50, #4A235A);
    }
    body.snow {
      background: linear-gradient(to right, #ABB8C2, #ECEFF1);
    }
    body.mist {
      background: linear-gradient(to right, #757575, #BDBDBD);
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .weather-box {
      background-color: rgba(255, 255, 255, 0.15);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 500px;
    }
    input {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 15px;
      background-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #00f2fe, #4facfe);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }
    #result.visible, #error.visible {
      margin-top: 20px;
      opacity: 1;
    }
    #result, #error {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #footer {
      background-color: rgba(255, 255, 255, 0.1);
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      margin-top: auto;
      backdrop-filter: blur(5px);
    }
    .loader {
      display: none;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #00f2fe;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    .loader.show {
      display: block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .current-weather {
      margin-bottom: 20px;
    }
    .current-weather-icon {
      font-size: 4rem;
      margin-bottom: 10px;
    }
    .current-weather-temp {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .current-weather-location {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .forecast-container {
      margin-top: 20px;
      text-align: center;
    }
    .forecast-title {
      margin-bottom: 15px;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .forecast-list {
      display: flex;
      overflow-x: auto;
      padding-bottom: 10px;
    }
    .forecast-day {
      background-color: rgba(255, 255, 255, 0.1);
      margin-right: 10px;
      padding: 15px;
      border-radius: 15px;
      min-width: 120px;
      text-align: center;
    }
    .forecast-day:last-child {
      margin-right: 0;
    }
    .forecast-day-date {
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    .forecast-day-icon {
      font-size: 2rem;
      margin-bottom: 5px;
    }
    .forecast-day-temps {
      font-size: 1rem;
    }

    @media (max-width: 600px) {
      .weather-box {
        padding: 1.5rem;
      }
      .current-weather-icon {
        font-size: 3rem;
      }
      .current-weather-temp {
        font-size: 1.8rem;
      }
      .forecast-day {
        padding: 10px;
        min-width: 100px;
      }
      .forecast-day-icon {
        font-size: 1.5rem;
      }
      .forecast-day-temps {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body class="loaded"> 
  <div class="container">
    <div class="weather-box">
      <h2>🌤️ Weather Forecast</h2>
      <input type="text" id="location" placeholder="Enter your city or country" onkeypress="handleKeyPress(event)" />
      <button onclick="fetchWeather()">Check Weather</button>
      <button id="unit-toggle" onclick="toggleUnit()">Switch to °F</button>
      <div class="loader" id="loader"></div>
      <div id="result"></div>
      <div id="error" style="color: red;"></div>
      <div id="ip-location" style="margin-top: 20px; font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="footer">🌍 Hosted by <strong>Pradeepkumar G</strong></div>

  <script>
    let isCelsius = true; 

    document.addEventListener('DOMContentLoaded', () => {
      document.body.classList.add('loaded');
      fetchIPAndLocation();
    });

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        fetchWeather();
      }
    }

    async function fetchIPAndLocation() {
      try {
        const res = await fetch("https://ipinfo.io/json?token=236fab372a1ef1");
        const data = await res.json();
        const location = data.city || 'New York';
        const ip = data.ip;
        const region = data.region;
        const country = data.country;
        document.getElementById("ip-location").innerText = `Your IP Address: ${ip}, Location: ${location}, ${region}, ${country}`;
        fetchWeather(location);  
      } catch (err) {
        console.log("IP/Location fetch error", err);
      }
    }

    async function fetchWeather(location = '') {
      const locationInput = document.getElementById('location');
      const locationValue = location || locationInput.value.trim();
      const result = document.getElementById('result');
      const error = document.getElementById('error');
      const loader = document.getElementById('loader');
      const body = document.body;

      if (!locationValue) return;

      result.classList.remove('visible');
      error.classList.remove('visible');
      loader.classList.add('show');

      try {
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(locationValue)}`);
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) {
          throw new Error("City not found.");
        }

        const { latitude, longitude, name, country } = geoData.results[0];
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
        );
        const weatherData = await weatherRes.json();

        const current = weatherData.current_weather;
        const forecast = weatherData.daily;

        const currentWeatherCode = current.weathercode;
        body.className = 'loaded'; 

        if ([0, 1].includes(currentWeatherCode)) {
          body.classList.add('clear');
        } else if ([2, 3].includes(currentWeatherCode)) {
          body.classList.add('clouds');
        } else if ([45, 48, 51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(currentWeatherCode)) {
          body.classList.add('rain');
        } else if ([71, 73, 75, 77, 85, 86].includes(currentWeatherCode)) {
          body.classList.add('snow');
        } else if ([95, 96, 99].includes(currentWeatherCode)) {
          body.classList.add('rain');
        } else if ([45, 48].includes(currentWeatherCode)) {
          body.classList.add('mist');
        }

        let forecastHTML = `
          <div class="forecast-container">
            <h3 class="forecast-title">7-Day Forecast</h3>
            <div class="forecast-list">
        `;

        for (let i = 0; i < 7; i++) {
          const date = forecast.time[i];
          const minTemp = isCelsius ? forecast.temperature_2m_min[i] : (forecast.temperature_2m_min[i] * 9/5) + 32;
          const maxTemp = isCelsius ? forecast.temperature_2m_max[i] : (forecast.temperature_2m_max[i] * 9/5) + 32;
          const icon = getWeatherIcon(forecast.weathercode[i]);
          const dayOfWeek = new Date(date).toLocaleDateString('en-US', { weekday: 'short' });

          forecastHTML += `
            <div class="forecast-day">
              <div class="forecast-day-date">${dayOfWeek}</div>
              <div class="forecast-day-icon">${icon}</div>
              <div class="forecast-day-temps">${Math.round(minTemp)}° / ${Math.round(maxTemp)}°</div>
            </div>
          `;
        }

        forecastHTML += `</div></div>`;

        result.innerHTML = `
          <div class="current-weather">
            <div class="current-weather-icon">${getWeatherIcon(currentWeatherCode)}</div>
            <div class="current-weather-temp">${Math.round(isCelsius ? current.temperature : (current.temperature * 9/5) + 32)}°</div>
            <div class="current-weather-location">${name}, ${country}</div>
          </div>
          ${forecastHTML}
        `;

        result.classList.add('visible');
        loader.classList.remove('show');
      } catch (err) {
        error.innerText = `Error: ${err.message}`;
        error.classList.add('visible');
        loader.classList.remove('show');
      }
    }

    function getWeatherIcon(weatherCode) {
      switch (weatherCode) {
        case 0: case 1: return '☀️'; 
        case 2: case 3: return '🌤️'; 
        case 45: case 48: return '🌫️'; 
        case 51: case 53: case 55: return '🌧️'; 
        case 71: case 73: case 75: return '❄️'; 
        default: return '🌦️'; 
      }
    }

    function toggleUnit() {
      isCelsius = !isCelsius;
      const unitToggleButton = document.getElementById('unit-toggle');
      unitToggleButton.innerText = isCelsius ? 'Switch to °F' : 'Switch to °C';
      fetchWeather(); // Refetch the weather based on the new unit
    }
  </script>
</body>
</html>
