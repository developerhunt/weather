<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Weather Report</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');
        body {
            font-family: 'Roboto', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: #fff;
        }

        .container {
            max-width: 500px;
            width: 100%;
            padding: 20px;
            background: rgba(0, 0, 0, 0.6);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            border-radius: 10px;
            outline: none;
            opacity: 0;
            transform: translateY(-20px);
            transition: opacity 0.5s, transform 0.5s;
        }

        .container.visible {
            opacity: 1;
            transform: translateY(0);
        }

        h1 {
            margin-bottom: 20px;
            font-weight: bold;
        }

        input,
        button {
            padding: 15px;
            margin: 10px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            width: calc(100% - 30px);
            outline: none;
        }

        button {
            background: #3498db;
            color: #fff;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background: #2980b9;
        }

        .result,
        .error {
            padding: 15px;
            margin: 15px 0;
            font-size: 18px;
            border-radius: 5px;
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.5s ease-out;
        }

        .result.visible,
        .error.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .result {
            background: rgba(46, 204, 113, 0.9);
            color: #2c3e50;
        }

        .error {
            background: rgba(231, 76, 60, 0.9);
            color: #fff;
        }

        @media (max-width: 600px) {
            body {
                padding: 20px;
            }

            .container {
                padding: 15px;
                box-shadow: none;
            }

            input,
            button {
                margin: 5px;
                padding: 10px;
            }
        }
    </style>
    <script>
        async function fetchWeather() {
            const location = document.getElementById('location').value;
            const apiKey = 'a25171bb0be3435236920ccc8e10ded3';
            const proxyUrl = 'https://cors-anywhere.herokuapp.com/';
            const apiUrl = `http://api.weatherstack.com/current?access_key=${apiKey}&query=${encodeURIComponent(location)}`;

            try {
                const response = await fetch(proxyUrl + apiUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const weather = await response.json();

                if (!weather.current) {
                    throw new Error(weather.error.info);
                }

                const icon = weather.current.weather_icons[0];
                document.getElementById('result').innerHTML = `<img src="${icon}" alt="Weather Icon" style="vertical-align:middle"> Temperature: ${weather.current.temperature}°C<br>Weather: ${weather.current.weather_descriptions[0]}`;
                document.getElementById('result').classList.add('visible');
                document.getElementById('error').classList.remove('visible');
            } catch (error) {
                document.getElementById('error').innerText = `Error: ${error.message}`;
                document.getElementById('error').classList.add('visible');
                document.getElementById('result').classList.remove('visible');
            }
        }

        document.addEventListener('DOMContentLoaded', function () {
            document.querySelector('.container').classList.add('visible');
        });
    </script>
</head>

<body>
    <div class="container">
        <h1>Live Weather Report</h1>
        <input type="text" id="location" name="location" placeholder="Enter location">
        <button onclick="fetchWeather()">Get Weather</button>
        <p id="result" class="result"></p>
        <p id="error" class="error"></p>
    </div>
</body>

</html>
