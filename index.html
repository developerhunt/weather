<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast</title>
  <link rel="icon" type="image/jpeg" href="https://i.pinimg.com/736x/77/0b/80/770b805d5c99c7931366c2e84e88f251.jpg" />
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #fff;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      transition: background 0.5s ease; /* Smooth background transition */
      background: #fff; /* Default white background */
    }
    body.loaded {
      background: linear-gradient(to right, #1e3c72, #2a5298); /* Initial gradient */
    }
    body.clear {
      background: linear-gradient(to right, #4776E6, #8E54E9);
    }
    body.clouds {
      background: linear-gradient(to right, #6D6027, #D2D091);
    }
    body.rain {
      background: linear-gradient(to right, #2C3E50, #4A235A);
    }
    body.snow {
      background: linear-gradient(to right, #ABB8C2, #ECEFF1);
    }
    body.mist {
      background: linear-gradient(to right, #757575, #BDBDBD);
    }
    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .weather-box {
      background-color: rgba(255, 255, 255, 0.15);
      padding: 2rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(10px);
      width: 90%;
      max-width: 500px;
    }
    input {
      padding: 12px;
      width: 100%;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      margin-bottom: 15px;
      background-color: rgba(255, 255, 255, 0.3);
      color: #fff;
    }
    input::placeholder {
      color: rgba(255, 255, 255, 0.7);
    }
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(to right, #00f2fe, #4facfe);
      color: white;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: linear-gradient(to right, #4facfe, #00f2fe);
    }
    #result.visible, #error.visible {
      margin-top: 20px;
      opacity: 1;
    }
    #result, #error {
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #footer {
      background-color: rgba(255, 255, 255, 0.1);
      text-align: center;
      padding: 15px;
      font-size: 0.9rem;
      margin-top: auto;
      backdrop-filter: blur(5px);
    }
    .loader {
      display: none;
      border: 5px solid #f3f3f3;
      border-top: 5px solid #00f2fe;
      border-radius: 50%;
      width: 30px;
      height: 30px;
      animation: spin 1s linear infinite;
      margin: 10px auto;
    }
    .loader.show {
      display: block;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .current-weather {
      margin-bottom: 20px;
    }
    .current-weather-icon {
      font-size: 4rem;
      margin-bottom: 10px;
    }
    .current-weather-temp {
      font-size: 2rem;
      font-weight: bold;
      margin-bottom: 5px;
    }
    .current-weather-location {
      font-size: 1.1rem;
      margin-bottom: 10px;
    }
    .forecast-container {
      margin-top: 20px;
      text-align: center;
    }
    .forecast-title {
      margin-bottom: 15px;
      font-size: 1.2rem;
      font-weight: bold;
    }
    .forecast-list {
      display: flex;
      overflow-x: auto; /* Enable horizontal scrolling for smaller screens */
      padding-bottom: 10px; /* Space for potential scrollbar */
    }
    .forecast-day {
      background-color: rgba(255, 255, 255, 0.1);
      margin-right: 10px;
      padding: 15px;
      border-radius: 15px;
      min-width: 120px; /* Ensure each day has a minimum width */
      text-align: center;
    }
    .forecast-day:last-child {
      margin-right: 0;
    }
    .forecast-day-date {
      font-size: 0.9rem;
      margin-bottom: 5px;
    }
    .forecast-day-icon {
      font-size: 2rem;
      margin-bottom: 5px;
    }
    .forecast-day-temps {
      font-size: 1rem;
    }

    /* Responsive Design */
    @media (max-width: 600px) {
      .weather-box {
        padding: 1.5rem;
      }
      .current-weather-icon {
        font-size: 3rem;
      }
      .current-weather-temp {
        font-size: 1.8rem;
      }
      .forecast-day {
        padding: 10px;
        min-width: 100px;
      }
      .forecast-day-icon {
        font-size: 1.5rem;
      }
      .forecast-day-temps {
        font-size: 0.9rem;
      }
    }
  </style>
</head>
<body class="loaded"> <div class="container">
    <div class="weather-box">
      <h2>🌤️ Weather Forecast</h2>
      <input type="text" id="location" placeholder="Enter your city or country" onkeypress="handleKeyPress(event)" />
      <button onclick="fetchWeather()">Check Weather</button>
      <div class="loader" id="loader"></div>
      <div id="result"></div>
      <div id="error" style="color: red;"></div>
      <div id="ip-location" style="margin-top: 20px; font-size: 0.9rem;"></div>
    </div>
  </div>

  <div id="footer">🌍 Hosted by <strong>Pradeepkumar G</strong></div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Ensure the initial background is set when the page loads
      document.body.classList.add('loaded');
    });

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        fetchWeather();
      }
    }

    async function fetchIPAndLocation() {
      try {
        const res = await fetch("https://ipinfo.io/json?token=236fab372a1ef1");
        const data = await res.json();
        if (!data.ip.includes(".")) {
          document.getElementById("ip-location").innerText =
            "Your IP Address: IPv6 address detected. Only IPv4 addresses are shown., Location: " + data.city + ", " + data.country;
        } else {
          document.getElementById("ip-location").innerText =
            `Your IP Address: ${data.ip}, Location: ${data.city}, ${data.country}`;
        }
      } catch (err) {
        console.log("IP/Location fetch error", err);
      }
    }

    fetchIPAndLocation();

    async function fetchWeather() {
      const locationInput = document.getElementById('location');
      const location = locationInput.value.trim();
      const result = document.getElementById('result');
      const error = document.getElementById('error');
      const loader = document.getElementById('loader');
      const body = document.body;

      if (!location) return;

      result.classList.remove('visible');
      error.classList.remove('visible');
      loader.classList.add('show');

      try {
        const geoRes = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(location)}`);
        const geoData = await geoRes.json();
        if (!geoData.results || geoData.results.length === 0) {
          throw new Error("City not found.");
        }

        const { latitude, longitude, name, country } = geoData.results[0];
        const weatherRes = await fetch(
          `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true&daily=temperature_2m_max,temperature_2m_min,weathercode&timezone=auto`
        );
        const weatherData = await weatherRes.json();

        const current = weatherData.current_weather;
        const forecast = weatherData.daily;

        // Set dynamic background
        const currentWeatherCode = current.weathercode;
        body.className = 'loaded'; // Ensure the base gradient is applied before specific weather
        if ([0, 1].includes(currentWeatherCode)) {
          body.classList.add('clear');
        } else if ([2, 3].includes(currentWeatherCode)) {
          body.classList.add('clouds');
        } else if ([45, 48, 51, 53, 55, 56, 57, 61, 63, 65, 66, 67, 80, 81, 82].includes(currentWeatherCode)) {
          body.classList.add('rain');
        } else if ([71, 73, 75, 77, 85, 86].includes(currentWeatherCode)) {
          body.classList.add('snow');
        } else if ([95, 96, 99].includes(currentWeatherCode)) {
          body.classList.add('rain'); // Thunderstorms often involve rain
        } else if ([45, 48].includes(currentWeatherCode)) {
          body.classList.add('mist');
        }

        let forecastHTML = `
          <div class="forecast-container">
            <h3 class="forecast-title">7-Day Forecast</h3>
            <div class="forecast-list">
        `;

        for (let i = 0; i < 7; i++) {
          const date = forecast.time[i];
          const minTemp = forecast.temperature_2m_min[i];
          const maxTemp = forecast.temperature_2m_max[i];
          const icon = getWeatherIcon(forecast.weathercode[i]);
          const dayOfWeek = new Date(date).toLocaleDateString('en-US', { weekday: 'short' });

          forecastHTML += `
            <div class="forecast-day">
              <div class="forecast-day-date">${dayOfWeek}</div>
              <div class="forecast-day-icon">${icon}</div>
              <div class="forecast-day-temps">${minTemp}°C / ${maxTemp}°C</div>
            </div>
          `;
        }

        forecastHTML += `
            </div>
          </div>
        `;

        result.innerHTML = `
          <div class="current-weather">
            <div class="current-weather-icon">${getWeatherIcon(current.weathercode)}</div>
            <strong class="current-weather-temp">${current.temperature}°C</strong><br>
            <span class="current-weather-location">${name}, ${country}</span><br>
            Wind: ${current.windspeed} km/h
          </div>
          ${forecastHTML}
        `;

        result.classList.add('visible');
      } catch (err) {
        body.className = 'loaded'; // Revert to the initial background on error
        error.innerText = `Error: ${err.message}`;
        error.classList.add('visible');
      } finally {
        loader.classList.remove('show');
      }
    }

    function getWeatherIcon(code) {
      const icons = {
        0: '☀️',    // Clear sky
        1: '🌤️',   // Mainly clear
        2: '⛅',   // Partly cloudy
        3: '☁️',   // Overcast
        45: '🌫️',  // Fog
        48: '🌫️',  // Depositing rime fog
        51: '🌦️',  // Drizzle: Light intensity
        53: '🌦️',  // Drizzle: Moderate intensity
        55: '🌧️',   // Drizzle: Dense intensity
        56: '🌧️',   // Freezing Drizzle: Light intensity
        57: '🌧️',   // Freezing Drizzle: Dense intensity
        61: '🌧️',   // Rain: Slight intensity
        63: '🌧️',   // Rain: Moderate intensity
        65: '🌧️',   // Rain: Heavy intensity
        66: '🌨️',  // Freezing Rain: Light intensity
        67: '🌨️',  // Freezing Rain: Heavy intensity
        71: '❄️',   // Snow fall: Slight intensity
        73: '❄️',   // Snow fall: Moderate intensity
        75: '❄️',   // Snow fall: Heavy intensity
        77: '❄️',   // Snow grains
        80: '🌦️',  // Rain showers: Slight intensity
        81: '🌧️',   // Rain showers: Moderate intensity
        82: '🌧️',   // Rain showers: Violent intensity
        85: '🌨️',  // Snow showers: Slight intensity
        86: '🌨️',  // Snow showers: Heavy intensity
        95: '⛈️',  // Thunderstorm: Slight or moderate
        96: '⛈️',  // Thunderstorm with slight hail
        99: '⛈️',  // Thunderstorm with heavy hail
      };
      return icons[code] || '🌈';
    }
  </script>
</body>
</html>
